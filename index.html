<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Cantine Vaucluse | Suivi ODD</title>
    <style>
        :root {
            --primary: #2e7d32;
            --bg: #f0f2f5;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        
        .card { padding: 15px; border-radius: 10px; color: white; font-weight: bold; }
        .c1 { background-color: #e67e22; } /* Déchets alim */
        .c2 { background-color: #3498db; } /* Serviettes */
        .c3 { background-color: #f1c40f; color: #333; } /* Pain */
        .c4 { background-color: #9b59b6; } /* Emballages */
        .c5 { background-color: #e74c3c; } /* Fruits */

        input { width: 80%; padding: 8px; margin-top: 10px; border: none; border-radius: 5px; }
        
        .result-box { margin-top: 30px; padding: 20px; background: #e8f5e9; border-radius: 10px; border: 2px dashed var(--primary); }
        #total-display { font-size: 2em; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Observatoire du Gaspillage - 700 Élèves</h1>
    <p>Saisissez les pesées du jour (en kg) pour calculer l'impact :</p>

    <div class="grid">
        <div class="card c1">
            <label>Déchets Restes</label>
            <input type="number" class="poids" value="0" oninput="calculer()">
        </div>
        <div class="card c2">
            <label>Serviettes Papier</label>
            <input type="number" class="poids" value="0" oninput="calculer()">
        </div>
        <div class="card c3">
            <label>Pain (Gaspillage)</label>
            <input type="number" class="poids" value="0" oninput="calculer()">
        </div>
        <div class="card c4">
            <label>Emballages</label>
            <input type="number" class="poids" value="0" oninput="calculer()">
        </div>
        <div class="card c5">
            <label>Fruits Entamés</label>
            <input type="number" class="poids" value="0" oninput="calculer()">
        </div>
    </div>

    <div class="result-box">
        <div>TOTAL DES DÉCHETS AUJOURD'HUI</div>
        <div id="total-display">0 kg</div>
        <p id="message"></p>
    </div>

    <footer style="margin-top:20px; font-size: 0.8em; color: gray;">
        Projet ODD - Collège du Vaucluse - 700 demi-pensionnaires
    </footer>
</div>

<script>
    function calculer() {
        let inputs = document.querySelectorAll('.poids');
        let total = 0;
        
        inputs.forEach(input => {
            total += parseFloat(input.value) || 0;
        });

        document.getElementById('total-display').innerText = total.toFixed(2) + " kg";
        
        let message = document.getElementById('message');
        if(total > 50) {
            message.innerText = "🚨 Attention, le gaspillage est élevé aujourd'hui !";
            message.style.color = "red";
        } else {
            message.innerText = "✅ Bravo, continuez vos efforts de tri !";
            message.style.color = "green";
        }
    }
</script>

</body>
</html>
